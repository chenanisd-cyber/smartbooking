spring.application.name=smartbooking

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/smartbooking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Brussels
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Let Flyway handle schema, not Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- Flyway ---
spring.flyway.out-of-order=true

# --- File uploads (show images) ---
upload.path=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- Logs ---
logging.level.org.springframework.web=INFO
