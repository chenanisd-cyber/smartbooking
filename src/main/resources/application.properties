spring.application.name=smartbooking

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/smartbooking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Brussels
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Let Flyway handle schema, not Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- Flyway ---
spring.flyway.out-of-order=true

# --- File uploads (show images) ---
upload.path=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- Stripe ---
stripe.secret.key=sk_test_REPLACE_WITH_YOUR_KEY
stripe.publishable.key=pk_test_REPLACE_WITH_YOUR_KEY

# --- Mail (MailTrap — dev/test) ---
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=MAILTRAP_USERNAME
spring.mail.password=MAILTRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL du frontend (utilisée dans les emails de reset)
app.frontend.url=http://localhost:3000

# --- Logs ---
logging.level.org.springframework.web=INFO
